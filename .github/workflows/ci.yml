---
name: CI
permissions: {}

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.14'

jobs:
  setup_release:
    name: Setup Release
    outputs:
      publish_release: ${{ steps.setup_release.outputs.publish_release }}
      release_body: ${{ steps.setup_release.outputs.release_body }}
      release_commit: ${{ steps.setup_release.outputs.release_commit }}
      release_generate_release_notes: ${{ steps.setup_release.outputs.release_generate_release_notes }}
      release_tag: ${{ steps.setup_release.outputs.release_tag }}
      release_version: ${{ steps.setup_release.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Release
        id: setup_release
        uses: LizardByte/actions/actions/release_setup@a46850981292c4bbc0c41715f286ad95adaaaf4a  # v2026.625.20301
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.os }})
    needs: setup_release
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            shell: "bash"
          - os: ubuntu-latest
            shell: "bash"
          - os: windows-latest
            shell: "msys2 {0}"
    defaults:
      run:
        shell: ${{ matrix.shell }}
    env:
      CMAKE_BUILD: build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      - name: Setup Dependencies Linux
        if: runner.os == 'Linux'
        run: |
          nxdk_dependencies=(
            "bison"
            "build-essential"
            "clang"
            "cmake"
            "flex"
            "git"
            "lld"
            "llvm"
          )
          moonlight_dependencies=(
          )
          dependencies=("${nxdk_dependencies[@]}" "${moonlight_dependencies[@]}")
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y "${dependencies[@]}"

      - name: Setup Dependencies macOS
        if: runner.os == 'macOS'
        run: |
          nxdk_dependencies=(
            "cmake"
            "coreutils"
            "lld"
            "llvm"
          )
          moonlight_dependencies=(
          )
          dependencies=("${nxdk_dependencies[@]}" "${moonlight_dependencies[@]}")
          brew install "${dependencies[@]}"

      - name: Setup Dependencies Windows
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884  # v2.32.0
        with:
          msystem: MINGW64
          update: true
          install: >-
            bison
            flex
            git
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-make

      - name: Setup python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
        with:
          enable-cache: true

      - name: Sync Python tools
        env:
          MSYS2_PATH_TYPE: inherit
          UV_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: |
          uv sync --project third-party/lizardbyte-common --locked --only-group test-c \
            --no-python-downloads \
            --no-install-project

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh --build-dir ${CMAKE_BUILD}

          # recursively list all files in build directory
          ls -R ${CMAKE_BUILD}

          # move artifacts
          mkdir -p artifacts
          tar -czf ./artifacts/Moonlight.tar.gz ./${CMAKE_BUILD}/xbox/xbe
          cp ./${CMAKE_BUILD}/xbox/Moonlight.iso ./artifacts

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: moonlight-${{ runner.os }}
          path: artifacts/

      - name: Run tests
        id: test
        working-directory: ${{ env.CMAKE_BUILD }}/tests
        run: ./test_moonlight --gtest_color=yes --gtest_output=xml:test_results.xml

      - name: Generate gcov report
        id: test_report
        # any except canceled or skipped
        if: >-
          always() &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure')
        env:
          MSYS2_PATH_TYPE: inherit
        run: |
          uv run --project third-party/lizardbyte-common --locked --no-sync gcovr ${CMAKE_BUILD} -r . \
            --filter src \
            --exclude-noncode-lines \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --verbose \
            --xml-pretty \
            -o "${CMAKE_BUILD}/coverage.xml"

      - name: Debug coverage file
        if: >-
          always() &&
          steps.test_report.outcome == 'success'
        run: cat "${CMAKE_BUILD}/coverage.xml"

      - name: Upload coverage
        # any except canceled or skipped
        if: >-
          always() &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure') &&
          startsWith(github.repository, 'LizardByte/')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./${{ env.CMAKE_BUILD }}/coverage.xml
          flags: ${{ runner.os }}
          report_type: coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload test results
        # any except canceled or skipped
        if: >-
          always() &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure') &&
          startsWith(github.repository, 'LizardByte/')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./${{ env.CMAKE_BUILD }}/tests/test_results.xml
          flags: ${{ runner.os }}
          handle_no_reports_found: true
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Create/Update GitHub Release
        # only publish release on ubuntu-latest, is there any difference between the different builds?
        if: needs.setup_release.outputs.publish_release == 'true' && matrix.os == 'ubuntu-latest'
        uses: LizardByte/actions/actions/release_create@a46850981292c4bbc0c41715f286ad95adaaaf4a  # v2026.625.20301
        with:
          allowUpdates: false
          body: ${{ needs.setup_release.outputs.release_body }}
          draft: true
          generateReleaseNotes: ${{ needs.setup_release.outputs.release_generate_release_notes }}
          name: ${{ needs.setup_release.outputs.release_tag }}
          prerelease: true
          tag: ${{ needs.setup_release.outputs.release_tag }}
          token: ${{ secrets.GH_BOT_TOKEN }}
